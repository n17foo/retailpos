name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch | minor | major | auto)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Clear yarn cache
        run: rm -rf ${{ steps.yarn-cache-dir-path.outputs.dir }}

      - name: Install dependencies (with retry)
        run: |
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if yarn install --frozen-lockfile --ignore-engines --network-timeout 100000; then
              echo "Installation successful"
              exit 0
            fi
            echo "Installation failed, clearing cache and retrying..."
            yarn cache clean
            rm -rf node_modules
            attempt=$((attempt + 1))
            sleep 5
          done
          echo "Installation failed after $max_attempts attempts"
          exit 1
        env:
          YARN_ENABLE_GLOBAL_CACHE: 'false'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run tests
        run: yarn test
        env:
          CI: true

      - name: Release (auto — reads commits)
        if: ${{ inputs.release_type == 'auto' }}
        run: yarn release

      - name: Release (explicit type)
        if: ${{ inputs.release_type != 'auto' }}
        run: yarn release --release-as ${{ inputs.release_type }}

      - name: Push tag and changelog
        run: git push --follow-tags origin main
